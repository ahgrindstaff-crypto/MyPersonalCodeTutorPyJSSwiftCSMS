<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mr. G's Code Tutor — Python · JavaScript · Swift</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f0f2f5;--sb:#1b1f2e;--sbt:#8b92a8;--sbh:rgba(255,255,255,0.06);--sba-bg:rgba(79,128,245,0.18);--sba:#7eaaff;--sl:#3d4460;--w:#fff;--ac:#4f80f5;--al:#eef3ff;--su:#16a34a;--sul:#f0fdf4;--sub:#86efac;--pu:#7c3aed;--pul:#f5f3ff;--t:#111827;--t2:#374151;--t3:#6b7280;--t4:#9ca3af;--bd:#e5e7eb;--cb:#f6f8fa;--cbb:#e2e8f0;--mono:'Courier New',monospace;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--r:8px;--rs:6px}
html,body{height:100%;overflow:hidden;font-family:var(--sans);background:var(--bg);color:var(--t)}
.app{display:flex;flex-direction:column;height:100vh}
.hdr{height:52px;background:var(--w);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;gap:6px;flex-shrink:0}
.logo{font-size:15px;font-weight:700;margin-right:12px}.logo span{color:var(--ac)}
.lbtn{padding:6px 14px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--bd);border-radius:var(--rs);background:transparent;color:var(--t3);font-family:var(--sans)}
.lbtn:hover{background:var(--bg);color:var(--t)}.lbtn.active{background:var(--ac);color:#fff;border-color:var(--ac)}
.pw{margin-left:auto;display:flex;align-items:center;gap:10px}
.pb{width:100px;height:6px;background:var(--bd);border-radius:3px;overflow:hidden}
.pbf{height:100%;background:var(--ac);border-radius:3px;transition:width .4s}
.pt{font-size:12px;color:var(--t4)}.rb{font-size:11px;color:var(--t4);cursor:pointer;background:none;border:none;font-family:var(--sans);padding:2px 6px;border-radius:4px}
.rb:hover{background:var(--bd);color:var(--t3)}
.layout{display:flex;flex:1;overflow:hidden}
.sb{width:210px;background:var(--sb);overflow-y:auto;flex-shrink:0}
.sb::-webkit-scrollbar{width:4px}.sb::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08)}
.slvl{padding:7px 14px 5px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--sl);position:sticky;top:0;background:var(--sb);z-index:1;border-top:1px solid rgba(255,255,255,0.04);margin-top:4px}
.slvl:first-child{margin-top:0;border-top:none}
.si{padding:9px 12px 9px 14px;font-size:12.5px;cursor:pointer;color:var(--sbt);display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,0.03)}
.si:hover{background:var(--sbh);color:#c8d0e4}.si.active{background:var(--sba-bg);color:var(--sba)}
.sn{font-size:9.5px;color:rgba(255,255,255,0.18);min-width:18px}.si.active .sn{color:rgba(126,170,255,0.5)}
.sd{width:14px;height:14px;border-radius:50%;background:#22c55e;display:none;align-items:center;justify-content:center;flex-shrink:0;margin-left:auto}
.sd svg{width:9px;height:9px;fill:white}.si.done .sd{display:flex}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--w)}
.ctabs{display:flex;border-bottom:1px solid var(--bd);padding:0 24px;flex-shrink:0}
.ctab{padding:11px 16px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--t3);border-bottom:2px solid transparent;font-family:var(--sans);margin-bottom:-1px}
.ctab:hover{color:var(--t)}.ctab.active{color:var(--ac);border-bottom-color:var(--ac)}
.pane{display:none;flex:1;overflow-y:auto}.pane.active{display:block}.pane-p.active{display:flex;flex-direction:column}
.lw{padding:28px 36px 52px;max-width:820px}
.lnum{font-size:11px;color:var(--t4);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.ltit{font-size:22px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px}.ltag{font-size:14px;color:var(--t3);margin-bottom:22px}
.an{background:var(--pul);border-left:3px solid var(--pu);border-radius:0 var(--rs) var(--rs) 0;padding:14px 18px;margin-bottom:22px}
.albl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--pu);margin-bottom:5px}
.atxt{font-size:14px;line-height:1.72;color:var(--t2)}
.slbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t4);margin:20px 0 8px}
.exp{font-size:14.5px;line-height:1.78;color:var(--t2)}
.codeblock{background:var(--cb);border:1px solid var(--cbb);border-radius:var(--r);padding:16px 18px;font-family:var(--mono);font-size:13px;line-height:1.72;overflow-x:auto;white-space:pre;color:var(--t);position:relative}
.cpb{position:absolute;top:10px;right:10px;padding:4px 10px;font-size:11px;cursor:pointer;border:1px solid var(--cbb);border-radius:4px;background:var(--w);color:var(--t3);font-family:var(--sans);opacity:0}
.codeblock:hover .cpb{opacity:1}.cpb:hover{background:var(--bg)}
.anns{display:flex;flex-direction:column;gap:9px}
.ann{display:flex;gap:12px;align-items:flex-start;font-size:13px;padding:6px 0;border-bottom:1px solid var(--bd)}.ann:last-child{border-bottom:none}
.ann-c{font-family:var(--mono);font-size:11.5px;background:var(--cb);border:1px solid var(--cbb);padding:3px 8px;border-radius:4px;white-space:pre;flex-shrink:0;max-width:230px;overflow-x:auto}
.ann-a{color:var(--t4);flex-shrink:0;padding-top:3px;font-size:12px}.ann-n{color:var(--t3);line-height:1.6;padding-top:2px}
.ex{background:var(--sul);border:1px solid var(--sub);border-radius:var(--r);padding:16px 18px;margin-top:20px}
.exl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--su);margin-bottom:5px}
.ext{font-size:14px;line-height:1.68;color:var(--t2)}.exh{font-size:12px;color:var(--t4);margin-top:8px}
.nr{display:flex;align-items:center;gap:10px;margin-top:28px;padding-top:20px;border-top:1px solid var(--bd)}
.nb{padding:8px 20px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--bd);border-radius:var(--rs);background:var(--w);color:var(--t);font-family:var(--sans)}
.nb:hover{background:var(--bg)}.nb.pr{background:var(--ac);color:#fff;border-color:var(--ac)}.nb.pr:hover{background:#3a6ae0}
.nb:disabled{opacity:.35;cursor:default;pointer-events:none}
.db{padding:8px 20px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--sub);border-radius:var(--rs);background:var(--sul);color:var(--su);font-family:var(--sans)}
.db:hover{background:#dcfce7}.db.mk{background:var(--su);color:#fff;border-color:var(--su)}
.pw2{display:flex;flex-direction:column;flex:1;padding:20px 24px;gap:12px;overflow:hidden}
.plbl{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em}
.ed{flex:1;font-family:var(--mono);font-size:13px;padding:14px 16px;border:1px solid var(--cbb);border-radius:var(--r);background:var(--cb);color:var(--t);resize:none;line-height:1.72;min-height:180px;outline:none}
.ed:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(79,128,245,0.1)}
.rr{display:flex;gap:8px;align-items:center;flex-shrink:0}
.rbtn{padding:8px 18px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--bd);border-radius:var(--rs);background:var(--w);color:var(--t);font-family:var(--sans)}
.rbtn:hover{background:var(--bg)}.rbtn.go{background:var(--su);color:#fff;border-color:var(--su)}.rbtn.go:hover{background:#15803d}
.rn{font-size:12px;color:var(--t4)}
.out{background:#1b1f2e;border-radius:var(--r);padding:12px 16px;font-family:var(--mono);font-size:12.5px;color:#c8d0e4;white-space:pre-wrap;min-height:80px;max-height:180px;overflow-y:auto;line-height:1.72;flex-shrink:0}
.out.err{color:#f87171}
.rfw{padding:28px 36px 48px;max-width:720px}
.rfq{background:var(--al);border:1px solid #c7d9fe;border-radius:var(--r);padding:16px 18px;margin-bottom:12px}
.rfqn{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ac);margin-bottom:5px}
.rfqt{font-size:14.5px;color:var(--t2);line-height:1.65}
.cc{background:var(--al);border:1px solid #c7d9fe;border-radius:var(--r);padding:24px 26px;max-width:540px;margin:28px 36px}
.cct{font-size:16px;font-weight:700;color:var(--ac);margin-bottom:8px}.ccb{font-size:14px;color:var(--t2);line-height:1.68;margin-bottom:14px}
.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{background:var(--w);border:1px solid #c7d9fe;border-radius:20px;padding:4px 12px;font-size:12px;color:var(--ac)}
.ww{padding:60px 40px;max-width:540px;margin:0 auto;text-align:center}
.ww h2{font-size:22px;font-weight:700;margin-bottom:10px}.ww p{font-size:14px;color:var(--t3);line-height:1.75;margin-bottom:8px}
.ww .pick{font-size:13px;color:var(--ac);margin-top:12px;font-weight:500}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
.sb::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1)}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="logo">Mr. G's Code<span>Tutor</span></div>
    <button class="lbtn active" data-lang="python" onclick="switchLang('python')">🐍 Python</button>
    <button class="lbtn" data-lang="javascript" onclick="switchLang('javascript')">⚡ JavaScript</button>
    <button class="lbtn" data-lang="swift" onclick="switchLang('swift')"> Swift</button>
    <div class="pw">
      <div class="pb"><div class="pbf" id="pbar" style="width:0%"></div></div>
      <span class="pt" id="ptext">0 completed</span>
      <button class="rb" onclick="resetProgress()">Reset</button>
    </div>
  </div>
  <div class="layout">
    <nav class="sb" id="sidebar"></nav>
    <div class="main">
      <div class="ctabs">
        <button class="ctab active" data-tab="lesson" onclick="switchTab('lesson')">📖 Lesson</button>
        <button class="ctab" data-tab="practice" onclick="switchTab('practice')">💻 Practice</button>
        <button class="ctab" data-tab="reflect" onclick="switchTab('reflect')">🤔 Reflect</button>
      </div>
      <div class="pane active" id="pane-lesson"></div>
      <div class="pane pane-p" id="pane-practice">
        <div class="pw2">
          <div class="plbl">Code Editor</div>
          <textarea class="ed" id="editor" spellcheck="false" placeholder="Load a lesson to see starter code, or type freely."></textarea>
          <div class="rr">
            <button class="rbtn" id="run-btn" onclick="handleRun()">&#9654; Run</button>
            <button class="rbtn" id="copy-btn" onclick="copyEditor()">&#8856; Copy</button>
            <span class="rn" id="rnote"></span>
          </div>
          <div class="plbl">Output</div>
          <div class="out" id="output">Output appears here when you run JavaScript...</div>
        </div>
      </div>
      <div class="pane" id="pane-reflect"></div>
    </div>
  </div>
</div>
<script>
const LESSONS = {};
const CURRICULUM = {
  python:[
    {level:'Beginner',lessons:[{id:'py-01',title:'Hello, Python!'},{id:'py-02',title:'Variables & Data Types'},{id:'py-03',title:'Getting Input'},{id:'py-04',title:'Conditionals'},{id:'py-05',title:'For Loops'},{id:'py-06',title:'While Loops'},{id:'py-07',title:'Functions'},{id:'py-08',title:'Lists'},{id:'py-09',title:'Dictionaries'}]},
    {level:'Intermediate',lessons:[{id:'py-10',title:'Error Handling',topic:'try/except blocks and exceptions'},{id:'py-11',title:'File I/O',topic:'reading and writing files with open()'},{id:'py-12',title:'Modules & Imports',topic:'import, math, random, datetime'},{id:'py-13',title:'List Comprehensions',topic:'compact list-building syntax'},{id:'py-14',title:'Classes & Objects',topic:'class, __init__, self, methods'}]},
    {level:'Advanced',lessons:[{id:'py-15',title:'Inheritance',topic:'subclasses, super(), method overriding'},{id:'py-16',title:'Decorators',topic:'function decorators and @syntax'},{id:'py-17',title:'Generators',topic:'yield and memory-efficient iteration'},{id:'py-18',title:'APIs',topic:'HTTP requests with the requests library'}]},
    {level:'Expert',lessons:[{id:'py-19',title:'Data Structures',topic:'stacks and queues from scratch'},{id:'py-20',title:'Sorting Algorithms',topic:'bubble sort, binary search, Big O'},{id:'py-21',title:'Design Patterns',topic:'singleton, factory, observer patterns'}]}
  ],
  javascript:[
    {level:'Foundation',lessons:[{id:'js-01',title:'let, const & var'},{id:'js-02',title:'Data Types & typeof'},{id:'js-03',title:'Template Literals'},{id:'js-04',title:'Array Methods'},{id:'js-05',title:'Objects & Destructuring'}]},
    {level:'Intermediate',lessons:[{id:'js-06',title:'Arrow Functions',topic:'=> syntax and this binding'},{id:'js-07',title:'Closures',topic:'scope chain and practical uses'},{id:'js-08',title:'Promises',topic:'.then(), .catch(), chaining'},{id:'js-09',title:'Async / Await',topic:'async functions and error handling'},{id:'js-10',title:'DOM Manipulation',topic:'querySelector, classList, innerHTML'},{id:'js-11',title:'Event Listeners',topic:'addEventListener and event objects'}]},
    {level:'Advanced',lessons:[{id:'js-12',title:'Classes & OOP',topic:'ES6 class, extends, super()'},{id:'js-13',title:'Fetch API',topic:'fetching JSON and handling responses'},{id:'js-14',title:'Error Handling',topic:'try/catch/finally, custom Error classes'}]},
    {level:'Expert',lessons:[{id:'js-15',title:'Prototype Chain',topic:'prototypal inheritance, Object.create()'},{id:'js-16',title:'Generators',topic:'function*, yield, iterables'},{id:'js-17',title:'Design Patterns',topic:'module, observer, factory'},{id:'js-18',title:'Performance',topic:'memory, debouncing, profiling'}]}
  ],
  swift:[
    {level:'Beginner',lessons:[{id:'sw-01',title:'Hello, Swift!'},{id:'sw-02',title:'var vs let'},{id:'sw-03',title:'Data Types'},{id:'sw-04',title:'String Interpolation'},{id:'sw-05',title:'Conditionals'},{id:'sw-06',title:'Loops'},{id:'sw-07',title:'Functions'},{id:'sw-08',title:'Arrays & Dictionaries'}]},
    {level:'Intermediate',lessons:[{id:'sw-09',title:'Optionals',topic:'Optional<T>, if let, ??, nil'},{id:'sw-10',title:'Structs',topic:'value types, properties, mutating'},{id:'sw-11',title:'Enums',topic:'cases, raw values, associated values'},{id:'sw-12',title:'Closures',topic:'syntax, trailing closures, capture'}]},
    {level:'Advanced',lessons:[{id:'sw-13',title:'Classes & Protocols',topic:'reference types, inheritance, protocols'},{id:'sw-14',title:'Error Handling',topic:'throws, do-try-catch, custom errors'},{id:'sw-15',title:'Generics',topic:'generic functions and types <T>'}]},
    {level:'Expert',lessons:[{id:'sw-16',title:'Concurrency',topic:'async/await, Task, structured concurrency'},{id:'sw-17',title:'SwiftUI Basics',topic:'Text, Button, VStack, HStack'},{id:'sw-18',title:'Property Wrappers',topic:'@State, @Binding, @ObservedObject'}]}
  ]
};
let cLang='python',cLesson=null,cTab='lesson';
let doneSet=new Set(JSON.parse(localStorage.getItem('ct_done')||'[]'));
function saveP(){localStorage.setItem('ct_done',JSON.stringify([...doneSet]));}
function markDone(id){doneSet.add(id);saveP();renderSB();updP();const b=document.getElementById('db');if(b){b.textContent='checkmark Complete';b.className='db mk';}}
function resetProgress(){if(!confirm('Reset all progress?'))return;doneSet.clear();saveP();renderSB();updP();if(cLesson)renderLP();}
function updP(){const all=document.querySelectorAll('.si').length;const d=doneSet.size;const p=all?Math.round(d/all*100):0;document.getElementById('pbar').style.width=p+'%';document.getElementById('ptext').textContent=d+' of '+all+' completed';}
function switchLang(lang){cLang=lang;cLesson=null;document.querySelectorAll('.lbtn').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));renderSB();showWelcome();updRunUI();}
function renderSB(){
  const sb=document.getElementById('sidebar');let n=1,h='';
  CURRICULUM[cLang].forEach(g=>{
    h+='<div class="slvl">'+g.level+'</div>';
    g.lessons.forEach(l=>{
      const num=String(n++).padStart(2,'0');
      h+='<div class="si'+(cLesson===l.id?' active':'')+(doneSet.has(l.id)?' done':'')+'" onclick="loadLesson(\''+l.id+'\')"><span class="sn">'+num+'</span><span style="flex:1">'+l.title+'</span><span class="sd"><svg viewBox="0 0 10 8"><polyline points="1,4 3.5,6.5 9,1" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span></div>';
    });
  });
  sb.innerHTML=h;updP();
}
function showWelcome(){document.getElementById('pane-lesson').innerHTML='<div class="ww"><h2>Welcome to CodeTutor</h2><p>Choose a lesson from the sidebar. Each one starts with a real-world analogy, then explains the concept in plain English, then shows a fully annotated code example.</p><p>The <strong>Practice</strong> tab has a code editor. JavaScript runs live in the browser. Python and Swift code can be copied to run externally.</p><p>The <strong>Reflect</strong> tab gives three thinking questions per lesson.</p><p class="pick">Pick a lesson from the sidebar to begin</p></div>';}
function getAllL(){return CURRICULUM[cLang].flatMap(g=>g.lessons);}
function getLIdx(id){return getAllL().findIndex(l=>l.id===id);}
function getLMeta(id){for(const g of Object.values(CURRICULUM).flat())for(const l of g.lessons)if(l.id===id)return l;}
function getTot(){return CURRICULUM[cLang].reduce((s,g)=>s+g.lessons.length,0);}
function loadLesson(id){cLesson=id;renderSB();if(cTab!=='lesson')switchTab('lesson');renderLP();updRunUI();document.getElementById('pane-lesson').scrollTop=0;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function renderLP(){
  const pane=document.getElementById('pane-lesson');
  const all=getAllL();const idx=getLIdx(cLesson);const d=LESSONS[cLesson];
  if(!d){const m=getLMeta(cLesson);const topic=m&&m.topic?m.topic:'this concept';pane.innerHTML='<div class="cc"><div class="cct">Coming up: '+esc(m?m.title:'')+'</div><div class="ccb">This lesson covers <strong>'+esc(topic)+'</strong>. Full content for intermediate, advanced, and expert levels will be added in a future update. In the meantime, search for tutorials on this topic.</div><div class="chips"><span class="chip">Search "'+esc(m?m.title:'')+' tutorial"</span><span class="chip">Try a small example</span><span class="chip">Check official docs</span></div></div>';return;}
  const prev=idx>0?all[idx-1]:null;const next=idx<all.length-1?all[idx+1]:null;
  const codeH=d.code.split('\n').map(l=>esc(l)).join('\n');
  const annH=(d.annotations||[]).map(a=>'<div class="ann"><div class="ann-c">'+esc(a.line)+'</div><div class="ann-a">&#8594;</div><div class="ann-n">'+esc(a.note)+'</div></div>').join('');
  const isDone=doneSet.has(cLesson);
  const lnm={python:'Python',javascript:'JavaScript',swift:'Swift'};
  pane.innerHTML='<div class="lw"><div class="lnum">Lesson '+(idx+1)+' of '+getTot()+' &mdash; '+lnm[cLang]+'</div><div class="ltit">'+esc(d.title||getLMeta(cLesson).title)+'</div><div class="ltag">'+esc(d.tagline)+'</div><div class="an"><div class="albl">&#128161; Real-world analogy</div><div class="atxt">'+esc(d.analogy)+'</div></div><div class="slbl">What this means in code</div><div class="exp">'+esc(d.explanation)+'</div><div class="slbl">Code example</div><div class="codeblock">'+codeH+'<button class="cpb" onclick="copyCode(this)">Copy</button></div>'+(annH?'<div class="slbl">Line by line</div><div class="anns">'+annH+'</div>':'')+'<div class="ex"><div class="exl">&#9999;&#65039; Practice challenge</div><div class="ext">'+esc(d.exercise)+'</div><div class="exh">'+(cLang==='javascript'?'Starter code is in the Practice tab — click Run to test it.':'Starter code is in the Practice tab. Copy it to run in your Python or Swift environment.')+'</div></div><div class="nr"><button class="nb" onclick="loadLesson(\''+(prev?prev.id:'')+'\''+')" '+(prev?'':'disabled')+'>&#8592; Previous</button><button class="db'+(isDone?' mk':'')+'" id="db" onclick="markDone(\''+cLesson+'\')">'+(isDone?'&#10003; Complete':'Mark Complete')+'</button><button class="nb pr" onclick="loadLesson(\''+(next?next.id:'')+'\''+')" '+(next?'':'disabled')+' style="margin-left:auto">Next &#8594;</button></div></div>';
  if(d.starter)document.getElementById('editor').value=d.starter;
}
function renderRfl(){const pane=document.getElementById('pane-reflect');const d=cLesson?LESSONS[cLesson]:null;if(!d||!d.reflect){pane.innerHTML='<div style="padding:32px;color:#9ca3af;font-size:14px">Load a lesson first to see reflection questions.</div>';return;}const qs=d.reflect.map((q,i)=>'<div class="rfq"><div class="rfqn">Question '+(i+1)+'</div><div class="rfqt">'+esc(q)+'</div></div>').join('');pane.innerHTML='<div class="rfw"><div class="slbl" style="margin-top:0">Reflection questions</div><p style="font-size:13px;color:#6b7280;margin-bottom:20px;line-height:1.6">Think through these before moving on.</p>'+qs+'</div>';}
function switchTab(tab){cTab=tab;document.querySelectorAll('.ctab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));document.getElementById('pane-lesson').classList.toggle('active',tab==='lesson');const pp=document.getElementById('pane-practice');pp.classList.toggle('active',tab==='practice');pp.classList.toggle('pane-p',true);document.getElementById('pane-reflect').classList.toggle('active',tab==='reflect');if(tab==='reflect')renderRfl();}
function updRunUI(){const isJS=cLang==='javascript';document.getElementById('rnote').textContent=isJS?'Runs live in your browser':cLang==='python'?'Python: copy and paste into replit.com or a local Python environment':'Swift: copy into Xcode or Swift Playgrounds';document.getElementById('run-btn').className=isJS?'rbtn go':'rbtn';}
function handleRun(){if(cLang==='javascript')runJS();else copyEditor();}
function runJS(){const code=document.getElementById('editor').value;const out=document.getElementById('output');const logs=[];const ol=console.log;console.log=(...a)=>logs.push(a.map(x=>typeof x==='object'?JSON.stringify(x,null,2):String(x)).join(' '));out.className='out';try{new Function(code)();out.textContent=logs.length?logs.join('\n'):'(no output — use console.log() to print values)';}catch(err){out.className='out err';out.textContent='Error: '+err.message;}finally{console.log=ol;}}
function copyEditor(){navigator.clipboard.writeText(document.getElementById('editor').value).then(()=>{const b=document.getElementById('copy-btn');const o=b.textContent;b.textContent='Copied!';setTimeout(()=>b.textContent=o,1800);});}
function copyCode(btn){const t=btn.parentElement.textContent.replace('Copy','').replace('Copied!','').trim();navigator.clipboard.writeText(t).then(()=>{btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy',1800);});}
window.switchLang=switchLang;window.switchTab=switchTab;window.loadLesson=loadLesson;
window.markDone=markDone;window.resetProgress=resetProgress;window.handleRun=handleRun;
window.copyEditor=copyEditor;window.copyCode=copyCode;
renderSB();showWelcome();updRunUI();
</script>
<script>
Object.assign(LESSONS,{
'py-01':{title:'Hello, Python!',tagline:"Display text and numbers to the screen — your very first Python command.",analogy:"print() is like writing on your classroom whiteboard. Whatever goes inside the parentheses appears on screen for everyone to see — Python talking back to you. Just as you write an answer on the board to show students what you found, print() shows you what your program has computed.",explanation:"The print() function outputs information to the screen. Text — called a string — must go in quotes (single or double, both work). Numbers go in without quotes. Lines starting with # are comments Python ignores entirely, like sticky notes. Separate multiple items with commas and Python adds spaces between them automatically.",code:"# A comment — Python ignores this\nprint('Hello, World!')\nprint('Welcome to Python!')\nprint(42)\nprint(3.14)\nprint('Years teaching:', 29)",annotations:[{line:"print('Hello, World!')",note:"Calls the print function — text in quotes is called a string"},{line:"# A comment",note:"Lines starting with # are skipped — notes for humans, invisible to Python"},{line:"print(42)",note:"Numbers print without quotes — Python recognizes them automatically"},{line:"print('Years teaching:', 29)",note:"Comma joins items — Python adds a space between each one automatically"}],exercise:"Write three print() statements: your full name, your school name, and how many years you have been in education.",starter:"print('Your name here')\nprint('School name here')\nprint(0)",reflect:["Why do text values need quotes but numbers do not?","What happens if you forget the parentheses after print?","How would you print your name and years of experience on the same line?"]},

'py-02':{title:'Variables & Data Types',tagline:"Store and label data using variables — Python's built-in filing system.",analogy:"A variable is like a labeled folder in your filing cabinet. The label is the variable name, whatever you put inside is the value. You can swap the contents anytime without changing the label. Python has four types of folders: one for text, one for whole numbers, one for decimals, and one for yes-or-no values.",explanation:"Variables store data for later use. Assign with a single equals sign. Python has four basic types: str for text in quotes, int for whole numbers, float for decimals, and bool for True or False. Python detects the type automatically — you never declare it yourself. The type() function reveals what kind of data a variable holds.",code:"name = 'Ms. Johnson'  # str\nyears = 15            # int\ngpa = 3.87            # float\ntenured = True        # bool\n\nprint(name)\nprint(years)\nprint(gpa)\nprint(tenured)\nprint(type(name))\nprint(type(years))",annotations:[{line:"name = 'Ms. Johnson'",note:"= assigns the right-side value to the left-side variable name"},{line:"years = 15",note:"Stores the integer 15 — no quotes because it is a number"},{line:"tenured = True",note:"Bool values are True or False — capital first letter required in Python"},{line:"print(type(name))",note:"type() returns the data type — great for understanding what you are working with"}],exercise:"Create four variables — your name (str), years of experience (int), a decimal score (float), and a True/False fact about yourself (bool). Print all four.",starter:"name = ''\nyears = 0\nscore = 0.0\nmorning = True\n\nprint(name)\nprint(years)\nprint(score)\nprint(morning)",reflect:["What is the difference between the number 7 and the string '7'? Why does it matter?","Can a variable name have spaces in it? What might you use instead?","What happens if you try to add a str variable and an int variable together?"]},

'py-03':{title:'Getting Input',tagline:"Accept user input with input() and convert it to the right type.",analogy:"input() is like handing out a form to a student. Python pauses and waits for them to write something, then stores the answer. The catch: every answer comes back as text, even numbers. It is like a student writing the digit 7 on paper — you have the symbol, not the number you can actually do math with. You have to convert it.",explanation:"The input() function displays a prompt and waits for the user to type. It always returns a string, no matter what was typed. To use typed numbers in math, convert with int() for whole numbers or float() for decimals. This is called type conversion. Wrapping input() directly inside int() converts in one step — a very common pattern.",code:"name = input('What is your name? ')\nprint('Hello,', name)\n\nage_text = input('Enter your age: ')\nage = int(age_text)\nprint('Next year:', age + 1)\n\nyears = int(input('Years teaching: '))\nprint('Halfway:', years // 2)\n\ngpa = float(input('Enter a GPA: '))\nprint('Rounded:', round(gpa, 1))",annotations:[{line:"name = input('What is your name? ')",note:"Displays the prompt and waits — stores whatever was typed as a string"},{line:"age = int(age_text)",note:"int() converts a string to a whole number — crashes if letters are typed"},{line:"years = int(input('Years teaching: '))",note:"One-step conversion — wrapping input() inside int() is very common"},{line:"years // 2",note:"// is floor division — gives a whole number result, no decimal"}],exercise:"Ask the user for a student name and a test score. Print: '[Name] scored [score] points.'",starter:"student = input('Student name: ')\nscore = int(input('Test score: '))\nprint(student, 'scored', score, 'points.')",reflect:["Why does input() always return a string even when the user types a number?","What error would you get if someone typed 'hello' when you called int(input(...))?","What is the difference between int() and float() — when would you choose each?"]},

'py-04':{title:'Conditionals',tagline:"Make decisions in your code with if, elif, and else.",analogy:"An if statement is like your student handbook policy tree. If a student does X, then Y happens. If not X but Z is true, then something else happens. Otherwise the default response kicks in. Python checks each condition in order, runs the first match, then skips the rest.",explanation:"if checks a condition that evaluates to True or False. elif means else if — a follow-up check run only when everything above it was False. else is the catch-all for when nothing matched. Python uses indentation of 4 spaces to define what belongs inside each block — not optional, it is how Python reads your structure.",code:"score = 85\n\nif score >= 90:\n    print('A — Excellent!')\nelif score >= 80:\n    print('B — Good work!')\nelif score >= 70:\n    print('C — Passing')\nelse:\n    print('Below passing')\n\nprint('Grade check done')\n\n# == equals  != not equal\n# >  greater  <  less\n# >= greater/equal  <= less/equal",annotations:[{line:"if score >= 90:",note:"Check the condition — the colon ends the condition line"},{line:"    print('A — Excellent!')",note:"Indented 4 spaces — only runs if the condition above was True"},{line:"elif score >= 80:",note:"Only checked if the if above was False — short for else if"},{line:"else:",note:"Runs when none of the conditions above matched"},{line:"print('Grade check done')",note:"Not indented — runs after the whole if/elif/else block, always"}],exercise:"Ask for a number of absences. Print 'Good standing' if under 5, 'At risk' if 5-9, 'Intervention required' if 10 or more.",starter:"absences = int(input('Number of absences: '))\n\nif absences < 5:\n    print('Good standing')\nelif absences < 10:\n    print('At risk')\nelse:\n    print('Intervention required')",reflect:["What is the difference between = and == in Python?","What happens if you write two separate if statements instead of if/elif?","Can you have an if without an else? What runs when the condition is False?"]},

'py-05':{title:'For Loops',tagline:"Repeat code automatically using for loops and range().",analogy:"A for loop is like taking attendance. You have a roster and go through it one name at a time, doing the same thing for each one. Python does this automatically — it takes a sequence and processes each item in order without you keeping track of position manually.",explanation:"A for loop repeats a block of code for each item in a sequence. The loop variable takes each value one at a time. range(n) generates numbers from 0 up to but not including n. range(start, stop) starts at start and stops before stop. The loop body must be indented 4 spaces.",code:"for i in range(5):\n    print('Count:', i)\n\nfor n in range(1, 6):\n    print('Number:', n)\n\nsubjects = ['Math', 'Science', 'CS']\nfor s in subjects:\n    print('Class:', s)\n\nfor i, s in enumerate(subjects):\n    print(i, '-', s)",annotations:[{line:"for i in range(5):",note:"Repeats with i = 0, 1, 2, 3, 4 — range(5) gives 5 values starting from 0"},{line:"for n in range(1, 6):",note:"Starts at 1, stops before 6 — gives 1, 2, 3, 4, 5"},{line:"for s in subjects:",note:"s takes each list value in turn — you choose the variable name"},{line:"for i, s in enumerate(subjects):",note:"enumerate() gives both the index number and the value together"}],exercise:"Print the 7 times table — 7 x 1 through 7 x 12 — showing the full equation on each line.",starter:"for i in range(1, 13):\n    result = 7 * i\n    print('7 x', i, '=', result)",reflect:["Why does range(5) give 0, 1, 2, 3, 4 and not 1, 2, 3, 4, 5?","What is the difference between looping with range() and looping directly over a list?","When would you use enumerate() instead of a plain for loop?"]}
});
</script>
<script>
Object.assign(LESSONS,{
'py-06':{title:'While Loops',tagline:"Repeat code while a condition is true — and control when it stops.",analogy:"A while loop is like a staff meeting that continues as long as there are agenda items. Before each round Python checks: is this still true? If yes, keep going. If no, the meeting ends. Unlike a for loop where you know the count in advance, a while loop keeps going until something changes.",explanation:"A while loop repeats as long as its condition is True. The condition is checked before each iteration — if it starts False, the loop body never runs. A common mistake is forgetting to update the variable the condition depends on, causing an infinite loop. break exits immediately. continue skips to the next iteration.",code:"count = 0\nwhile count < 5:\n    print('Count:', count)\n    count += 1\nprint('Done!')\n\ntotal = 20\nwhile True:\n    print(total)\n    total -= 7\n    if total < 0:\n        break\n\nfor i in range(8):\n    if i == 3:\n        continue\n    print(i, end=' ')",annotations:[{line:"while count < 5:",note:"Checks the condition before every iteration — runs as long as it is True"},{line:"count += 1",note:"Critical — without updating count, it never changes and you get an infinite loop"},{line:"while True:",note:"Intentional infinite loop — you must use break to exit at some point"},{line:"break",note:"Immediately exits the loop — skips the rest of the body and the condition"},{line:"continue",note:"Skips the rest of this iteration and jumps back to check the condition"}],exercise:"Write a while loop that starts at 100, subtracts 13 each time, and prints each result. Stop when the number goes below zero.",starter:"number = 100\n\nwhile number >= 0:\n    print(number)\n    number = number - 13\n\nprint('Finished!')",reflect:["What risk does a while loop have that a for loop does not?","What is the difference between break and continue?","When would you choose a while loop over a for loop?"]},

'py-07':{title:'Functions',tagline:"Package reusable code into functions — write once, use anywhere.",analogy:"A function is like a lesson plan. You write it once, give it a name, and you can run that same plan anytime just by calling its name. You can also customize it with parameters — like a lesson plan template with blanks where you fill in the topic, grade level, or duration.",explanation:"Define a function with def, a name, and parentheses. Parameters are the inputs listed in the parentheses — they are placeholders. When you call the function, you pass actual values called arguments. The return statement sends a result back to whoever called the function. A function without return gives back None. Define before calling.",code:"def greet(name):\n    print('Hello,', name)\n\ngreet('Python')\ngreet('World')\n\ndef add(a, b):\n    return a + b\n\nresult = add(5, 3)\nprint('Sum:', result)\n\ndef intro(name, role='teacher'):\n    return name + ' is a ' + role\n\nprint(intro('Alex'))\nprint(intro('Sam', 'student'))",annotations:[{line:"def greet(name):",note:"def defines a function — name is a parameter, a placeholder for the real value"},{line:"greet('Python')",note:"Calling the function — 'Python' is the argument that fills the name parameter"},{line:"return a + b",note:"return sends the computed value back to whoever called the function"},{line:"role='teacher'",note:"Default parameter — used automatically when the caller does not provide a value"}],exercise:"Write a function called letter_grade that takes a score and returns the letter: A for 90+, B for 80+, C for 70+, D for 60+, F for below 60. Test it with four different scores.",starter:"def letter_grade(score):\n    if score >= 90:\n        return 'A'\n    elif score >= 80:\n        return 'B'\n    elif score >= 70:\n        return 'C'\n    elif score >= 60:\n        return 'D'\n    else:\n        return 'F'\n\nprint(letter_grade(95))\nprint(letter_grade(83))\nprint(letter_grade(71))\nprint(letter_grade(45))",reflect:["What is the difference between a parameter and an argument?","What does a function return if you do not write a return statement?","Why is it useful to have default parameter values?"]},

'py-08':{title:'Lists',tagline:"Store ordered collections of data in lists — Python's most versatile structure.",analogy:"A list is like your class roster — an ordered collection where each student has a spot number. The roster starts at position 0, not 1, which surprises everyone at first. You can add students, remove them, sort the list, or grab anyone by their position number.",explanation:"A list stores multiple items in order inside square brackets, separated by commas. Access items by index starting at 0. Negative indexes count from the end — [-1] is always last. Lists are mutable, meaning you can change them after creation. Key methods: append() adds to end, remove() deletes the first match, pop() removes and returns the last item, sort() sorts in place, len() returns the count.",code:"students = ['Alice', 'Bob', 'Carol', 'Dave']\n\nprint(students[0])\nprint(students[-1])\nprint(students[1:3])\n\nstudents.append('Eve')\nstudents.remove('Bob')\n\nprint(students)\nprint('Count:', len(students))\n\nfor s in students:\n    print(s)",annotations:[{line:"students[0]",note:"Index 0 is the first item — Python always counts starting from zero"},{line:"students[-1]",note:"Negative index counts from end — [-1] is the last, [-2] is second to last"},{line:"students[1:3]",note:"Slice gives a portion — starts at index 1, stops before index 3"},{line:"students.append('Eve')",note:"append() adds one item to the very end of the list"},{line:"students.remove('Bob')",note:"remove() finds and deletes the first item matching that value"}],exercise:"Create a list of 5 subjects. Add one more, remove one, sort alphabetically, then print the final list and its count.",starter:"subjects = ['Math', 'Science', 'CS', 'English', 'History']\n\nsubjects.append('Art')\nsubjects.remove('History')\nsubjects.sort()\n\nprint(subjects)\nprint('Total:', len(subjects))",reflect:["Why does Python start indexing at 0 instead of 1?","What is the difference between sort() and sorted()?","What is the difference between remove() and pop()?"]},

'py-09':{title:'Dictionaries',tagline:"Store labeled key-value pairs in dictionaries — Python's lookup table.",analogy:"A dictionary is like a student information card. Instead of looking up a student by row number like a list, you look them up by a label. You ask for 'grade' and get back the grade. You ask for 'email' and get back the email. The label is called a key, and what it points to is the value.",explanation:"A dictionary stores key-value pairs inside curly braces. Access values using square brackets with the key name. Add or update by assigning to a key. The get() method is safer — it returns None instead of crashing if the key does not exist. Loop through a dictionary with .items() to get both key and value.",code:"teacher = {\n    'name': 'Mr. G',\n    'years': 29,\n    'subject': 'CS'\n}\n\nprint(teacher['name'])\nprint(teacher['years'])\n\nteacher['school'] = 'Blue Valley'\n\nprint(teacher.get('phone', 'Not on file'))\n\nfor key, value in teacher.items():\n    print(key, ':', value)",annotations:[{line:"teacher['name']",note:"Access a value by its key — use square brackets with the key as a string"},{line:"teacher['school'] = 'Blue Valley'",note:"Assign to a new key to add it — same syntax updates an existing key too"},{line:"teacher.get('phone', 'Not on file')",note:"get() is safe — returns the default value if the key does not exist"},{line:"for key, value in teacher.items():",note:".items() gives both the key and value in each iteration of the loop"}],exercise:"Create a dictionary for a student with at least four keys: name, grade_level, favorite_subject, and gpa. Print each value by key, then loop through all pairs.",starter:"student = {\n    'name': 'Alex',\n    'grade_level': 8,\n    'favorite_subject': 'CS',\n    'gpa': 3.7\n}\n\nprint(student['name'])\nprint(student['gpa'])\n\nfor key, value in student.items():\n    print(key, ':', value)",reflect:["What is the difference between a list and a dictionary? When would you choose one over the other?","What happens if you access a key that does not exist in a dictionary?","Can a dictionary value be another dictionary? What might that be useful for?"]}
});
</script>
<script>
Object.assign(LESSONS,{
'js-01':{title:'let, const & var',tagline:"Understand the three ways to declare variables — and when to use each one.",analogy:"Think of const as a permanent marker on a label — once written, it cannot change. let is a dry-erase marker — same label, but you can update the content. var is an older chalk marker from decades past — it works but has confusing quirks that trip people up, so modern developers avoid it.",explanation:"const declares a variable that cannot be reassigned — use it for values that should not change. let declares a variable you plan to update. Both const and let are block-scoped, meaning they only exist inside the curly braces where they were defined. var is function-scoped and gets hoisted, causing confusing bugs. Modern rule: use const by default, switch to let only when you need to reassign.",code:"const school = 'Blue Valley';\nconst pi = 3.14;\nconsole.log(school);\n\nlet count = 0;\ncount = count + 1;\ncount += 1;\nconsole.log(count);\n\nif (true) {\n    let insideOnly = 'only here';\n    const alsoInside = 42;\n    console.log(insideOnly);\n}\n// insideOnly not accessible here\n\nvar oldStyle = 'avoid in modern code';",annotations:[{line:"const school = 'Blue Valley';",note:"const: value is locked — reassigning it later causes an error"},{line:"let count = 0;",note:"let: value can be reassigned — use when the value needs to change"},{line:"count += 1;",note:"+= is shorthand — same as count = count + 1"},{line:"let insideOnly = 'only here';",note:"let and const are block-scoped — they only live inside their enclosing { }"},{line:"var oldStyle",note:"var is function-scoped and hoisted — causes confusing behavior, avoid it"}],exercise:"Declare a const for your school name and a let for a student count starting at 0. Add 5 to the count three times using += and print the count after each addition.",starter:"const schoolName = 'Blue Valley';\nlet studentCount = 0;\n\nstudentCount += 5;\nconsole.log('Count:', studentCount);\n\nstudentCount += 5;\nconsole.log('Count:', studentCount);\n\nstudentCount += 5;\nconsole.log('Count:', studentCount);",reflect:["Why might using const by default make your code safer and easier to read?","What does block-scoped mean, and how is it different from function-scoped?","Can you change the contents of a const array or object? Why or why not?"]},

'js-02':{title:'Data Types & typeof',tagline:"Explore all six JavaScript data types and identify them with typeof.",analogy:"Imagine a filing cabinet with six folder types: text folders, number folders, true/false folders, an intentionally-empty folder, a not-yet-filled folder, and a complex container folder. JavaScript has exactly six primitive types. typeof is the label on the outside that tells you what kind of folder you are holding.",explanation:"JavaScript has six primitive types: string for text in quotes, number for all numbers including decimals, boolean for true or false in lowercase, null for intentionally empty, undefined for declared but not yet assigned, and symbol for unique identifiers. The typeof operator returns the type as a string. One famous quirk: typeof null returns 'object' — a bug from 1995 that was never fixed.",code:"let name = 'Alice';\nlet age = 14;\nlet score = 98.5;\nlet passing = true;\nlet phone = null;\nlet address;\n\nconsole.log(typeof name);\nconsole.log(typeof age);\nconsole.log(typeof passing);\nconsole.log(typeof phone);\nconsole.log(typeof address);\n\nconsole.log('5' + 3);\nconsole.log('5' - 3);",annotations:[{line:"let phone = null;",note:"null means intentionally empty — you set this on purpose to show absence"},{line:"let address;",note:"Declared but not assigned — JavaScript gives it undefined automatically"},{line:"typeof phone",note:"Returns 'object' — a famous JavaScript bug that was never corrected"},{line:"'5' + 3",note:"Type coercion: + with a string converts everything to string — result is '53'"},{line:"'5' - 3",note:"Math operators convert to number — result is 2"}],exercise:"Declare one variable of each type. Use typeof to print the type of each. Then try adding a string and number with + and with - and observe the difference.",starter:"let myString = 'Hello';\nlet myNumber = 42;\nlet myBool = false;\nlet myNull = null;\nlet myUndef;\n\nconsole.log(typeof myString);\nconsole.log(typeof myNumber);\nconsole.log(typeof myBool);\nconsole.log(typeof myNull);\nconsole.log(typeof myUndef);\n\nconsole.log('10' + 5);\nconsole.log('10' - 5);",reflect:["What is the difference between null and undefined? When would you use each?","Why is JavaScript's automatic type coercion potentially dangerous?","Python has separate int and float types. JavaScript has one number type. What are the trade-offs?"]},

'js-03':{title:'Template Literals',tagline:"Build cleaner strings with backticks and ${} — modern JavaScript's best string tool.",analogy:"Template literals are like a mail-merge document. You write the template once with blank spaces marked by dollar-sign-brace, and JavaScript fills in the actual values automatically. Compare that to the old way of gluing string pieces together with plus signs, which gets messy fast when you have multiple variables.",explanation:"Template literals use backtick characters instead of quotes. Inside, use ${expression} to embed any JavaScript value or expression directly in the string. The expression is evaluated and converted to a string automatically. Template literals also support true multiline strings without any special characters — just press Enter inside the backticks.",code:"const name = 'Alice';\nconst score = 94;\nconst subject = 'Computer Science';\n\nconsole.log('Old: ' + name + ' scored ' + score);\n\nconsole.log(`New: ${name} scored ${score} in ${subject}.`);\n\nconsole.log(`Next goal: ${score + 1}`);\nconsole.log(`Result: ${score >= 70 ? 'Pass' : 'Fail'}`);\n\nconst card = `Student: ${name}\nSubject: ${subject}\nScore: ${score}`;\nconsole.log(card);",annotations:[{line:"` ... ${name} ... `",note:"Backticks mark a template literal — different from single or double quotes"},{line:"${score}",note:"${} evaluates the expression inside and inserts the result as a string"},{line:"${score + 1}",note:"Any expression works inside ${} — math, comparisons, function calls"},{line:"${score >= 70 ? 'Pass' : 'Fail'}",note:"Ternary: if score >= 70 insert 'Pass', otherwise insert 'Fail'"},{line:"const card = `Student: ${name}",note:"Template literals support real newlines — press Enter inside the backticks"}],exercise:"Create variables for a student name, grade level, and three test scores. Use a template literal to print a formatted report showing each score and the average.",starter:"const studentName = 'Jordan';\nconst grade = 8;\nconst test1 = 88;\nconst test2 = 92;\nconst test3 = 79;\nconst avg = (test1 + test2 + test3) / 3;\n\nconsole.log(`Report Card`);\nconsole.log(`Student: ${studentName}  Grade: ${grade}`);\nconsole.log(`Scores: ${test1}, ${test2}, ${test3}`);\nconsole.log(`Average: ${avg.toFixed(1)}`);",reflect:["What are two advantages of template literals over string concatenation?","What does .toFixed(1) do to a number?","What does the ternary operator ? : do and how does it compare to if/else?"]},

'js-04':{title:'Array Methods',tagline:"Transform and filter arrays using map(), filter(), forEach(), and find().",analogy:"Think of array methods as different tools for working with your gradebook. forEach() is like reading every entry aloud — you process each but create no new list. map() is like applying a curve — you get back a new list with every score transformed. filter() is like pulling out only the students above a threshold — you get back a shorter list.",explanation:"Array methods let you work with arrays in a clear, readable way. forEach() runs a function for each element and returns nothing. map() transforms every element and returns a new array of the same length. filter() tests each element and returns a new array of only the elements that passed. These methods accept callback functions — functions passed as arguments.",code:"const scores = [78, 92, 55, 88, 70, 95];\n\nscores.forEach(s => console.log('Score:', s));\n\nconst curved = scores.map(s => s + 5);\nconsole.log('Curved:', curved);\n\nconst passing = scores.filter(s => s >= 70);\nconsole.log('Passing:', passing);\nconsole.log('Count passing:', passing.length);\n\nconst first90 = scores.find(s => s >= 90);\nconsole.log('First 90+:', first90);",annotations:[{line:"scores.forEach(s => console.log('Score:', s))",note:"forEach runs the arrow function once for each item — s holds the current value"},{line:"scores.map(s => s + 5)",note:"map returns a NEW array — each element is replaced by the result of s + 5"},{line:"scores.filter(s => s >= 70)",note:"filter returns a NEW array — only items where the test returns true"},{line:"s => s + 5",note:"Arrow function shorthand — means 'take s, return s + 5'"},{line:"scores.find(s => s >= 90)",note:"find returns the first matching item, or undefined if nothing matches"}],exercise:"Start with 8 student scores. Use filter() to get scores 80 and above, then map() to add a 5-point bonus to those. Print the original, filtered, and final arrays.",starter:"const studentScores = [65, 88, 72, 91, 55, 83, 79, 96];\n\nconst above80 = studentScores.filter(s => s >= 80);\nconsole.log('Original:', studentScores);\nconsole.log('Above 80:', above80);\n\nconst withBonus = above80.map(s => s + 5);\nconsole.log('With bonus:', withBonus);",reflect:["What is the key difference between map() and filter() in terms of what they return?","When would you use forEach() instead of map()?","What is a callback function, and why do array methods use them?"]},

'js-05':{title:'Objects & Destructuring',tagline:"Create objects, access their properties, and unpack them cleanly with destructuring.",analogy:"A JavaScript object is like a student file folder — it holds multiple pieces of related information under one name, each labeled so you can find it. Destructuring is like emptying that folder and labeling each piece on your desk at once. Instead of saying student.name every time, you pull out name, grade, and score all in one line.",explanation:"An object stores key-value pairs inside curly braces. Access values with dot notation (object.key) or bracket notation. Add new properties anytime by assigning to them. Destructuring extracts multiple properties into separate variables in one line. The spread operator (...) copies all properties from one object into another — useful for making updated copies without changing the original.",code:"const student = {\n    name: 'Jordan',\n    grade: 8,\n    score: 91,\n    passing: true\n};\n\nconsole.log(student.name);\nconsole.log(student.score);\n\nstudent.teacher = 'Mr. G';\n\nconst { name, grade, score } = student;\nconsole.log(`${name} in grade ${grade} scored ${score}`);\n\nconst updated = { ...student, score: 95 };\nconsole.log('Original:', student.score);\nconsole.log('Updated:', updated.score);",annotations:[{line:"const student = {",note:"Object literal — key: value pairs inside curly braces, comma-separated"},{line:"student.name",note:"Dot notation accesses a property — clean and readable when key name is known"},{line:"student.teacher = 'Mr. G';",note:"Assign to a new key to add it — objects can be changed after creation"},{line:"const { name, grade, score } = student;",note:"Destructuring — extracts three properties into three variables in one line"},{line:"const updated = { ...student, score: 95 };",note:"Spread copies all properties — score: 95 then overrides just that one value"}],exercise:"Create a teacher object with five properties. Destructure out three of them. Then create an updated copy using spread that changes one property and print both the original and updated.",starter:"const teacher = {\n    name: 'Mr. Grindstaff',\n    school: 'Blue Valley',\n    experience: 29,\n    subject: 'CS',\n    tenured: true\n};\n\nconst { name, school, experience } = teacher;\nconsole.log(`${name} at ${school} with ${experience} years.`);\n\nconst updated = { ...teacher, experience: 30 };\nconsole.log('Original experience:', teacher.experience);\nconsole.log('Updated experience:', updated.experience);",reflect:["What is the difference between dot notation and bracket notation for accessing object properties?","Why is destructuring useful — what problem does it solve?","When you spread-copy an object and change a value, the original stays unchanged. Why might this matter?"]}
});
</script>
<script>
Object.assign(LESSONS,{
'sw-01':{title:'Hello, Swift!',tagline:"Write your first Swift code and display output using print().",analogy:"Swift's print() works just like putting text on a board for the class to see. Whatever goes inside the parentheses appears in the output area immediately. It is Python's print() with a Swift accent — same concept, slightly different rules.",explanation:"Swift is Apple's programming language for iOS, macOS, and more. The print() function outputs text to the console. Strings go in double quotes in Swift — single quotes are not used. Multiple items separated by commas print with spaces between them. Comments start with // for single lines or /* ... */ for multiple lines. Swift is compiled and type-safe, so errors are caught before the program runs.",code:'// Single-line comment\nprint("Hello, World!")\nprint("Welcome to Swift!")\nprint(42)\nprint(3.14)\nprint("Years:", 29)\n\n/* Multi-line comment\n   Runs in Xcode or Swift Playgrounds\n   on Mac, iPad, or iPhone */\n\nprint("Swift is made by Apple")',annotations:[{line:'print("Hello, World!")',note:"Calls print — text in double quotes is a Swift String (not single quotes)"},{line:"// Single-line comment",note:"// starts a comment — Swift ignores everything after it on that line"},{line:'print("Years:", 29)',note:"Multiple items print with spaces between them"},{line:"/* Multi-line */",note:"Block comments can span multiple lines — wrap with /* and */"}],exercise:'Write three print() statements in Swift: your full name, your school, and your years of teaching.',starter:'print("Your name here")\nprint("School name")\nprint(29)',reflect:["How is Swift print() similar to and different from Python print()?","Why does Swift use double quotes for strings and not single quotes?","Swift is compiled — what advantage does catching errors before running give you?"]},

'sw-02':{title:'var vs let',tagline:"Understand var for changeable values and let for constants in Swift.",analogy:"In Swift, let is like carving something in stone — once set, it cannot change. var is like writing in pencil — you can erase and rewrite. Swift actively encourages you to use let by default and only reach for var when you genuinely need to change the value. This makes code safer and clearer about intent.",explanation:"Declare a constant with let — its value cannot be changed after the first assignment. Declare a variable with var — its value can be reassigned. Swift uses type inference, meaning it figures out the type from the value you assign. You can also add a type annotation with a colon after the name. Swift is strict: using a let like a var causes a compile error.",code:'let school = "Blue Valley"\nlet pi = 3.14159\nprint(school)\nprint(pi)\n\nvar count = 0\ncount = count + 1\ncount += 1\nprint(count)\n\nlet name: String = "Alice"\nlet age: Int = 14\nlet gpa: Double = 3.9\nlet active: Bool = true\n\nprint(type(of: name))\nprint(type(of: age))',annotations:[{line:'let school = "Blue Valley"',note:"let declares a constant — trying to reassign it later causes a compile error"},{line:"var count = 0",note:"var declares a variable — you can reassign it as many times as needed"},{line:"count += 1",note:"+= adds to the current value — same shorthand as Python and JavaScript"},{line:'let name: String = "Alice"',note:"Type annotation — colon then the type name explicitly declares the type"}],exercise:'Create a let for your school name and a var for a student count starting at 0. Increase the count by 1 three times and print the count each time.',starter:'let schoolName = "Blue Valley"\nvar studentCount = 0\n\nstudentCount += 1\nprint("Count:", studentCount)\n\nstudentCount += 1\nprint("Count:", studentCount)\n\nstudentCount += 1\nprint("Count:", studentCount)',reflect:["Why does Swift encourage using let by default instead of var?","What is type inference and what is the benefit of a language that supports it?","In Swift, a let causes a compile error if you try to change it. Python has no such restriction. What are the trade-offs?"]},

'sw-03':{title:'Data Types',tagline:"Learn Swift's four basic data types and when to use each one.",analogy:"Swift's type system is like a very organized filing cabinet with strictly labeled folders. String for text, Int for whole numbers, Double for decimals, Bool for yes or no. Once a value goes in a folder, it stays that type. Swift will not let you accidentally mix them up without explicitly asking for a conversion.",explanation:"Swift's four basic types: String for text in double quotes, Int for whole numbers, Double for decimal numbers, and Bool for true or false in lowercase. Swift is strongly typed — you cannot accidentally assign the wrong type. Converting between types requires explicit conversion like Int(someDouble) or Double(someInt). There is no automatic mixing.",code:'let name: String = "Mr. G"\nlet years: Int = 29\nlet rating: Double = 4.8\nlet isTeacher: Bool = true\n\nprint(name)\nprint(years)\nprint(rating)\nprint(isTeacher)\n\nprint(type(of: name))\nprint(type(of: years))\n\nlet yearsDouble = Double(years)\nlet rounded = Int(rating)\nprint(yearsDouble)\nprint(rounded)',annotations:[{line:'let name: String = "Mr. G"',note:"String holds text — must be in double quotes in Swift"},{line:"let years: Int = 29",note:"Int holds whole numbers — no decimals"},{line:"let rating: Double = 4.8",note:"Double holds decimal numbers — use Double, not Float, for most Swift code"},{line:"let isTeacher: Bool = true",note:"Bool is true or false — lowercase in Swift"},{line:"let yearsDouble = Double(years)",note:"Explicit conversion from Int to Double — Swift never converts automatically"},{line:"let rounded = Int(rating)",note:"Converting Double to Int truncates the decimal — does not round"}],exercise:'Create four variables — one of each basic type — using information about yourself. Convert the Int to a Double and print the result. Also print type(of:) for each.',starter:'let myName: String = "Your name"\nlet myYears: Int = 0\nlet myScore: Double = 0.0\nlet morning: Bool = true\n\nprint(myName)\nprint(myYears)\nprint(myScore)\nprint(morning)\n\nlet yearsAsDouble = Double(myYears)\nprint("As Double:", yearsAsDouble)',reflect:["What is the difference between Float and Double in Swift? Which should you use?","Why does Swift require explicit type conversion instead of doing it automatically?","What happens when you convert a Double like 3.9 to an Int — do you get 3 or 4?"]},

'sw-04':{title:'String Interpolation',tagline:"Embed variables directly in strings using Swift's backslash-parentheses syntax.",analogy:"String interpolation in Swift is like a fill-in-the-blank worksheet that fills itself in. You write the sentence with blank spots marked by backslash-parentheses, and Swift drops in the correct values automatically. Compare that to gluing string pieces with plus signs — interpolation is faster to write and much easier to read.",explanation:"Swift string interpolation uses the backslash-paren syntax inside a double-quoted string. Any expression — variables, math, function calls — can go inside the parentheses. Swift evaluates the expression and converts it to a String automatically. This works for all types, not just strings. No plus signs or explicit conversion needed.",code:'let name = "Alice"\nlet grade = 8\nlet score = 91.5\nlet passing = true\n\nprint("Hello, \\(name)!")\nprint("\\(name) is in grade \\(grade).")\nprint("Score: \\(score)")\nprint("Passing: \\(passing)")\nprint("Next grade: \\(grade + 1)")\n\nlet report = """\nStudent: \\(name)\nGrade: \\(grade)\nScore: \\(score)\n"""\nprint(report)',annotations:[{line:'print("Hello, \\(name)!")',note:"\\() is replaced by the value of name — no quotes or concatenation needed"},{line:'print("Score: \\(score)")',note:"Swift automatically converts Double to String in interpolation"},{line:'print("Next grade: \\(grade + 1)")',note:"Any expression works inside \\() — math runs first, then converts to String"},{line:'let report = """',note:"Triple quotes create a multi-line string in Swift"}],exercise:'Create variables for a student name, subject, score (Double), and whether they passed (Bool). Use interpolation to print a two-sentence summary.',starter:'let studentName = "Jordan"\nlet subject = "Math"\nlet testScore: Double = 87.5\nlet passed = true\n\nprint("\\(studentName) is taking \\(subject).")\nprint("Score: \\(testScore) — Passed: \\(passed)")',reflect:["How is Swift string interpolation similar to JavaScript template literals?","What does the ternary operator ? : do inside interpolation?","What are triple-quote strings useful for?"]}
});
</script>
<script>
Object.assign(LESSONS,{
'sw-05':{title:'Conditionals',tagline:"Control flow with if, else if, else, and Swift's powerful switch statement.",analogy:"Swift's if statement is like your student handbook policy tree. If condition A is true, follow path A. If not A but B is true, follow path B. Otherwise take the default path. Swift also has switch, which is like a multi-choice version that can match ranges — far more powerful than most languages.",explanation:"Swift's if checks a condition — if true, runs the block. else if adds follow-up conditions. else is the default. In Swift, the condition does NOT need parentheses, but the code block DOES need curly braces even for one line. Swift's switch is exhaustive — it must cover all possible values, and it can match ranges using the ... and ..< operators.",code:'let score = 85\n\nif score >= 90 {\n    print("A")\n} else if score >= 80 {\n    print("B")\n} else if score >= 70 {\n    print("C")\n} else {\n    print("Below C")\n}\n\nswitch score {\ncase 90...100:\n    print("A range")\ncase 80..<90:\n    print("B range")\ncase 70..<80:\n    print("C range")\ndefault:\n    print("Below C")\n}',annotations:[{line:"if score >= 90 {",note:"No parentheses around the condition — curly braces are required in Swift"},{line:"} else if score >= 80 {",note:"else if is two words — checked only if everything above was false"},{line:"switch score {",note:"Swift switch is exhaustive — must cover all possible values"},{line:"case 90...100:",note:"... is a closed range — includes both 90 and 100"},{line:"case 80..<90:",note:"..<  is half-open — includes 80 but excludes 90"}],exercise:'Write a Swift if/else-if/else for letter grades. Then rewrite it as a switch statement using ranges.',starter:'let testScore = 78\n\nif testScore >= 90 {\n    print("A")\n} else if testScore >= 80 {\n    print("B")\n} else if testScore >= 70 {\n    print("C")\n} else {\n    print("Below C")\n}\n\nswitch testScore {\ncase 90...100: print("Switch: A")\ncase 80..<90:  print("Switch: B")\ncase 70..<80:  print("Switch: C")\ndefault:       print("Switch: Below C")\n}',reflect:["Swift does not require parentheses in if conditions. Why do some languages require them?","What makes Swift's switch more powerful than a series of if/else if statements?","What is the difference between ... and ..< for ranges in Swift?"]},

'sw-06':{title:'Loops',tagline:"Repeat code using Swift's for-in loops, while loops, and range operators.",analogy:"Swift's for-in loop is like going through a stack of papers one by one — you touch each exactly once, in order. While loops are like reviewing papers until you have found what you need. Ranges define exactly how many papers are in the stack, and whether the last one counts.",explanation:"Swift's for-in loop iterates over sequences — arrays, ranges, strings. The range 1...5 gives 1, 2, 3, 4, 5 (closed — both ends included). The range 1..<5 gives 1, 2, 3, 4 (half-open — excludes last). If you do not need the loop variable, use underscore _ as a placeholder. while loops run as long as their condition is true.",code:'for i in 1...5 {\n    print("Count:", i)\n}\n\nfor i in 1..<5 {\n    print(i, terminator: " ")\n}\nprint()\n\nfor _ in 1...3 {\n    print("Repeat!")\n}\n\nlet subjects = ["Math", "CS", "Science"]\nfor s in subjects {\n    print("Class:", s)\n}\n\nvar n = 0\nwhile n < 4 {\n    print("While:", n)\n    n += 1\n}',annotations:[{line:"for i in 1...5 {",note:"Closed range — i takes values 1, 2, 3, 4, 5 (both ends included)"},{line:"for i in 1..<5 {",note:"Half-open range — i takes 1, 2, 3, 4 (excludes 5)"},{line:'terminator: " "',note:"terminator replaces the default newline — prints items on the same line"},{line:"for _ in 1...3 {",note:"Underscore _ discards the loop variable when you do not need it"},{line:"n += 1",note:"Critical — without this update, the while loop runs forever"}],exercise:'Print the 9 times table (9 x 1 through 9 x 12) using a for-in loop with a closed range.',starter:'for i in 1...12 {\n    let result = 9 * i\n    print("9 x \\(i) = \\(result)")\n}',reflect:["What is the practical difference between 1...5 and 1..<5?","When would you use a while loop instead of a for-in loop?","What does the underscore _ mean as a loop variable?"]},

'sw-07':{title:'Functions',tagline:"Write reusable code with Swift functions — including parameter labels and return types.",analogy:"Swift functions are like very precise lesson plan templates. Not only do you name the function, you also label each input for clarity. When you call the function, the labels make it read almost like a sentence — calculateArea(width: 10, height: 5) tells you exactly what each number means at a glance.",explanation:"Swift functions use the func keyword. Each parameter has an external label used when calling and an internal name used inside the function. Return types come after ->. Use _ as the external label to call without labels. Swift is strict about return types — if you declare a function returns Int, it must always return Int.",code:'func greet(name: String) -> String {\n    return "Hello, \\(name)!"\n}\nprint(greet(name: "Alice"))\n\nfunc add(first: Int, second: Int) -> Int {\n    return first + second\n}\nprint(add(first: 5, second: 3))\n\nfunc multiply(by factor: Int, value: Int) -> Int {\n    return factor * value\n}\nprint(multiply(by: 3, value: 10))\n\nfunc square(_ number: Int) -> Int {\n    return number * number\n}\nprint(square(7))',annotations:[{line:"func greet(name: String) -> String {",note:"func defines a function — -> String declares what type it returns"},{line:'print(greet(name: "Alice"))',note:"Call with the label — Swift requires parameter labels by default"},{line:"func multiply(by factor: Int, value: Int)",note:"'by' is the external label — 'factor' is the internal name inside the function"},{line:"func square(_ number: Int)",note:"_ as external label means no label required when calling — just square(7)"}],exercise:'Write a Swift function letterGrade(score: Int) -> String that returns A/B/C/D/F. Call it with five different scores.',starter:'func letterGrade(score: Int) -> String {\n    switch score {\n    case 90...100: return "A"\n    case 80..<90:  return "B"\n    case 70..<80:  return "C"\n    case 60..<70:  return "D"\n    default:       return "F"\n    }\n}\n\nprint(letterGrade(score: 95))\nprint(letterGrade(score: 83))\nprint(letterGrade(score: 71))\nprint(letterGrade(score: 55))',reflect:["What is the difference between the external label and internal name of a Swift parameter?","Why do you think Swift requires parameter labels when calling? What problem does this solve?","What does -> Void mean, and when would you use it?"]},

'sw-08':{title:'Arrays & Dictionaries',tagline:"Store ordered data in Arrays and labeled data in Dictionaries — typed and safe.",analogy:"Swift Arrays are like a typed class roster — every item must be the same type, they are in order, and you access by position. Swift Dictionaries are like a student information card system — you look up by key and get back the value. Swift is stricter than Python or JavaScript: you cannot mix types in the same collection.",explanation:"Swift arrays are declared with [Type] and only hold values of that type. Access by index starting at 0. Use append() to add, remove(at:) to remove by position, and contains() to check membership. Dictionaries use [KeyType: ValueType]. Accessing a dictionary value returns an Optional since the key might not exist. Use the ?? operator to provide a default value.",code:'var students: [String] = ["Alice", "Bob", "Carol"]\nprint(students[0])\nprint(students.count)\nstudents.append("Dave")\nstudents.remove(at: 1)\nprint(students)\n\nif students.contains("Alice") {\n    print("Alice is in the list")\n}\n\nvar grades: [String: Int] = [\n    "Alice": 91, "Carol": 85\n]\nprint(grades["Alice"] ?? 0)\ngrades["Dave"] = 78\nfor (name, score) in grades {\n    print("\\(name): \\(score)")\n}',annotations:[{line:'var students: [String] = [...]',note:"[String] means this array can only hold String values — typed collection"},{line:"students.count",note:"count gives the number of items — Swift uses .count, not len()"},{line:"students.remove(at: 1)",note:"remove(at:) removes by index — items shift down to fill the gap"},{line:"students.contains(\"Alice\")",note:"contains() returns true if the value is found — very readable"},{line:'print(grades["Alice"] ?? 0)',note:"Dictionary access returns Optional — ?? provides a default if key is missing"}],exercise:'Create a [String: Int] dictionary with five subjects and scores. Loop through and print each. Then print only subjects scoring 85 or above.',starter:'var subjectScores: [String: Int] = [\n    "Math": 91, "Science": 78,\n    "CS": 95, "English": 82, "History": 74\n]\n\nprint("All subjects:")\nfor (subject, score) in subjectScores {\n    print("\\(subject): \\(score)")\n}\n\nprint("\\nScores 85+:")\nfor (subject, score) in subjectScores {\n    if score >= 85 {\n        print("\\(subject): \\(score)")\n    }\n}',reflect:["Swift arrays and dictionaries are typed. Python lists and dicts can hold anything. What is the trade-off?","Why does accessing a Swift dictionary value return an Optional?","What is the ?? operator and when would you use it?"]}
});
</script>

<style>
.eds-wrap{border-top:1px solid var(--bd);padding-top:14px;flex-shrink:0}
.eds-head{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.eds-btns{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.ed-link{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;font-size:12.5px;font-weight:500;cursor:pointer;border:1px solid var(--bd);border-radius:var(--rs);background:var(--w);color:var(--t);text-decoration:none;font-family:var(--sans);transition:all .15s;line-height:1}
.ed-link:hover{background:var(--bg);border-color:var(--ac);color:var(--ac)}
.ed-badge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;border-radius:20px;padding:2px 7px;color:#fff;flex-shrink:0}
.ed-badge.district{background:var(--ac)}
.ed-badge.pick{background:var(--pu)}
.eds-note{font-size:11.5px;color:var(--t4);line-height:1.6}
.eds-note strong{color:var(--t3)}
</style>
<script>
(function(){
  var EDITORS = {
    python: [
      {name:'CodeHS', url:'https://codehs.com', badge:'District', badgeClass:'district', note:'District sandbox — supports all three languages'},
      {name:'Pickcode', url:'https://app.pickcode.io/login', badge:null, note:'Python online editor'},
      {name:'Raspberry Pi Editor', url:'https://editor.raspberrypi.org/en-US/projects/blank-python-starter', badge:"Teacher's Pick", badgeClass:'pick', note:'Mr. Grindstaff\'s preferred Python editor'}
    ],
    javascript: [
      {name:'CodeHS', url:'https://codehs.com', badge:'District', badgeClass:'district', note:'District sandbox — supports all three languages'}
    ],
    swift: [
      {name:'CodeHS', url:'https://codehs.com', badge:'District', badgeClass:'district', note:'District sandbox — supports all three languages'},
      {name:'Swift Playgrounds', url:'https://apps.apple.com/us/app/swift-playgrounds/id1496833156', badge:null, note:'Free iPad or Mac app from Apple'},
      {name:'Xcode', url:'https://apps.apple.com/us/app/xcode/id497799835', badge:null, note:'Full development environment — Mac only'}
    ]
  };

  function buildHTML(lang) {
    var editors = EDITORS[lang] || [];
    var btns = editors.map(function(e) {
      var badge = e.badge ? '<span class="ed-badge '+e.badgeClass+'">'+e.badge+'</span>' : '';
      return '<a href="'+e.url+'" target="_blank" rel="noopener noreferrer" class="ed-link">'+badge+'&#128279; '+e.name+'</a>';
    }).join('');
    var note = lang === 'javascript'
      ? '<strong>Tip:</strong> JavaScript already runs live in the Practice tab above. Use CodeHS if you prefer a full environment or want to save your work.'
      : '<strong>Before clicking:</strong> copy your code from the editor above — it will not transfer automatically. Paste it into the external editor to run.';
    return '<div class="eds-head">&#128279; Open in External Editor</div><div class="eds-btns">'+btns+'</div><div class="eds-note">'+note+'</div>';
  }

  function injectSection(lang) {
    var prac = document.querySelector('.pw2');
    if (!prac) return;
    var sec = document.getElementById('eds-sec');
    if (!sec) {
      sec = document.createElement('div');
      sec.id = 'eds-sec';
      sec.className = 'eds-wrap';
      prac.appendChild(sec);
    }
    sec.innerHTML = buildHTML(lang);
  }

  // Wrap switchLang to keep editors in sync
  var origSwitch = window.switchLang;
  window.switchLang = function(lang) {
    origSwitch(lang);
    injectSection(lang);
  };

  // Init on load with a small delay to ensure DOM is ready
  setTimeout(function(){ injectSection(typeof cLang !== 'undefined' ? cLang : 'python'); }, 100);
})();
</script>
<script>
// Safe JS runner — intercepts window.print(), alert(), confirm(), prompt()
// Prevents browser dialogs from firing during code execution
(function(){
  window.handleRun = function() {
    if (typeof cLang !== 'undefined' && cLang !== 'javascript') {
      // Non-JS: just copy to clipboard
      navigator.clipboard.writeText(document.getElementById('editor').value).then(function(){
        var b = document.getElementById('copy-btn');
        var o = b.textContent;
        b.textContent = 'Copied!';
        setTimeout(function(){ b.textContent = o; }, 1800);
      });
      return;
    }

    var code = document.getElementById('editor').value;
    var out  = document.getElementById('output');
    var logs = [];

    // Save originals
    var saved = {
      log:     console.log,
      error:   console.error,
      warn:    console.warn,
      print:   window.print,
      alert:   window.alert,
      confirm: window.confirm,
      prompt:  window.prompt
    };

    // Safe overrides during execution
    console.log   = function(){ logs.push(Array.from(arguments).map(function(x){ return typeof x==='object'?JSON.stringify(x,null,2):String(x); }).join(' ')); };
    console.error = function(){ logs.push('ERROR: '+Array.from(arguments).join(' ')); };
    console.warn  = function(){ logs.push('WARN: '+Array.from(arguments).join(' ')); };
    window.print   = function(){ logs.push('\u26a0\ufe0f  print() is a Python function. In JavaScript, use console.log() to display output.'); };
    window.alert   = function(m){ logs.push('\ud83d\udcac alert: '+m); };
    window.confirm = function(m){ logs.push('\ud83d\udcac confirm: '+m+' \u2192 returned true'); return true; };
    window.prompt  = function(m){ logs.push('\ud83d\udcac prompt: '+m+' \u2192 returned null'); return null; };

    out.className = 'out';
    try {
      new Function(code)();
      out.textContent = logs.length ? logs.join('\n') : '(no output \u2014 use console.log() to print values)';
    } catch(err) {
      out.className = 'out err';
      out.textContent = 'Error: ' + err.message;
    } finally {
      // Always restore originals
      console.log    = saved.log;
      console.error  = saved.error;
      console.warn   = saved.warn;
      window.print   = saved.print;
      window.alert   = saved.alert;
      window.confirm = saved.confirm;
      window.prompt  = saved.prompt;
    }
  };
})();
</script>
